<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, viewport-fit=cover">
  <title>小松鼠能量伙伴 · 山林午后</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Georgia', 'Noto Serif SC', serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      position: relative;
      transition: background 0.8s ease, color 0.8s ease;
      user-select: none;
      background: #D4C5A9;
      --primary: #E8A87C;
      --primary-hover: #d49560;
      --primary-light: #f0dcc8;
      --primary-lighter: #faf3eb;
      --primary-lightest: #fefbf8;
      --bg-card: rgba(232, 220, 200, 0.9);
      --bg-stat: #f0e5d5;
      --border: #d4c0a0;
      --border-light: #e0d0b5;
      --text-dark: #4a3525;
      --text-medium: #6b5540;
      --tag-bg: #f0e5d8;
      --badge-bg: #E8A87C;
      --badge-text: #4a3525;
      --fox-fur: #D4A373;
      --fox-dark: #c08a55;
      --fox-cream: #F5F1E8;
      --fox-ear-tip: #4A5D23;
      --watermark-bg: rgba(232, 168, 124, 0.8);
      --stat-text: #6b5540;
      --stat-label: #6b5540;
    }

    body.theme-sunlight {
      background: #F5F1E8;
      --primary: #7A8B69;
      --primary-hover: #5a6b4a;
      --primary-light: #d5dcc8;
      --primary-lighter: #edf0e5;
      --primary-lightest: #f7f9f3;
      --bg-card: rgba(255, 255, 255, 0.85);
      --bg-stat: #f5f3ed;
      --border: #e0d8c8;
      --border-light: #ebe3d5;
      --text-dark: #4a3f35;
      --text-medium: #6b5f52;
      --tag-bg: #efe8db;
      --badge-bg: #7A8B69;
      --badge-text: white;
      --fox-fur: #E8A87C;
      --fox-dark: #d49560;
      --fox-cream: #F5F1E8;
      --fox-ear-tip: #4A5D23;
      --watermark-bg: rgba(122, 139, 105, 0.8);
      --stat-text: #6b5f52;
      --stat-label: #6b5f52;
    }

    body.theme-forest {
      background: #2C3E2D;
      --primary: #7A8B69;
      --primary-hover: #4A5D23;
      --primary-light: #3a4e35;
      --primary-lighter: #344030;
      --primary-lightest: #2f3a2c;
      --bg-card: rgba(40, 55, 42, 0.9);
      --bg-stat: #344030;
      --border: #4A5D23;
      --border-light: #3a4e35;
      --text-dark: #D4C5A9;
      --text-medium: #D4C5A9;
      --tag-bg: #3a4e35;
      --badge-bg: #7A8B69;
      --badge-text: #D4C5A9;
      --fox-fur: #E8A87C;
      --fox-dark: #d49560;
      --fox-cream: #F5F1E8;
      --fox-ear-tip: #2C3E2D;
      --watermark-bg: rgba(122, 139, 105, 0.7);
      --stat-text: #D4C5A9;
      --stat-label: #D4C5A9;
    }

    .theme-switcher {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 8px;
      z-index: 200;
      background: rgba(255, 255, 255, 0.7);
      padding: 6px 12px;
      border-radius: 25px;
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    .theme-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid white;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }
    .theme-btn:hover {
      transform: scale(1.2);
    }
    .theme-btn.active {
      border-color: #333;
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.12);
    }
    .theme-btn.dusk {
      background: linear-gradient(135deg, #D4C5A9, #E8A87C);
    }
    .theme-btn.sunlight {
      background: linear-gradient(135deg, #F5F1E8, #7A8B69);
    }
    .theme-btn.forest {
      background: linear-gradient(135deg, #2C3E2D, #4A5D23);
    }

    .forest-corner-btn {
      position: fixed;
      bottom: 25px;
      left: 25px;
      z-index: 200;
      background: rgba(44, 62, 45, 0.85);
      color: #D4C5A9;
      border: none;
      padding: 10px 18px;
      border-radius: 25px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(5px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
      letter-spacing: 1px;
      transition: all 0.3s;
      font-family: inherit;
    }
    .forest-corner-btn:hover {
      background: rgba(30, 45, 30, 0.95);
      transform: translateY(-2px);
    }

    .forest-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #2C3E2D;
      z-index: 9999;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      animation: forestFadeIn 1.5s ease;
    }
    .forest-overlay.active {
      display: flex;
    }

    @keyframes forestFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .forest-content { text-align: center; position: relative; animation: forestBreathing 4s ease-in-out infinite; }
    @keyframes forestBreathing { 0%,100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.03); opacity: 1; } }

    .forest-breath-circle {
      width: 120px; height: 120px; border-radius: 50%;
      background: #7A8B69; margin: 0 auto 30px;
      animation: breathGlow 6s ease-in-out infinite;
      box-shadow: 0 0 40px rgba(122, 139, 105, 0.4);
    }
    @keyframes breathGlow { 0%,100% { background:#7A8B69; box-shadow:0 0 40px rgba(122,139,105,0.4); transform:scale(0.9); } 50% { background:#4A5D23; box-shadow:0 0 60px rgba(74,93,35,0.6); transform:scale(1.15); } }

    .forest-twinkle { position:absolute; width:6px; height:6px; border-radius:50%; background:#E8A87C; opacity:0; animation:twinkle 4s ease-in-out infinite; }
    .forest-twinkle:nth-child(1) { top:-30px; left:40px; animation-delay:0s; }
    .forest-twinkle:nth-child(2) { top:20px; right:-20px; animation-delay:1.5s; }
    .forest-twinkle:nth-child(3) { bottom:-20px; left:60px; animation-delay:3s; }
    .forest-twinkle:nth-child(4) { top:-10px; right:30px; animation-delay:2s; }
    .forest-twinkle:nth-child(5) { bottom:10px; left:-10px; animation-delay:3.5s; }
    @keyframes twinkle { 0%,100% { opacity:0; transform:scale(0.5); } 50% { opacity:0.8; transform:scale(1.5); } }

    .forest-hint { font-size:0.75rem; margin-top:20px; opacity:0.4; letter-spacing:1px; color:#D4C5A9; }
    .forest-leaves { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:hidden; }
    .leaf { position:absolute; font-size:1.5rem; animation:leafFall linear infinite; opacity:0.5; }
    @keyframes leafFall { 0% { transform:translateY(-10vh) rotate(0deg); opacity:0; } 10% { opacity:0.5; } 90% { opacity:0.3; } 100% { transform:translateY(110vh) rotate(720deg); opacity:0; } }

    .forest-volume-control {
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%); z-index:10001;
      display:none; align-items:center; gap:10px; background:rgba(0,0,0,0.3);
      padding:8px 16px; border-radius:20px; backdrop-filter:blur(5px);
    }
    .forest-overlay.active~.forest-volume-control { display:flex; }
    .forest-volume-control label { color:#D4C5A9; font-size:0.7rem; font-weight:600; }
    .forest-volume-control input[type="range"] { -webkit-appearance:none; width:100px; height:4px; border-radius:4px; background:#4A5D23; outline:none; cursor:pointer; }
    .forest-volume-control input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:#E8A87C; cursor:pointer; border:2px solid #D4C5A9; }

    .fox-draggable {
      position: fixed;
      z-index: 150;
      cursor: grab;
      transition: filter 0.3s;
      filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.25));
      pointer-events: auto;
      right: 40px;
      top: 50%;
      transform: translateY(-50%);
    }
    .fox-draggable:active { cursor:grabbing; filter:drop-shadow(0 12px 28px rgba(0,0,0,0.4)); }
    .fox-draggable.dragging { cursor:grabbing; opacity:0.85; }

    .fox-svg-container {
      width: 110px; height: 130px; position: relative;
      transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
      pointer-events: none;
    }
    .fox-svg-container.state-energetic { animation: foxBounce 0.45s ease-in-out infinite alternate; }
    .fox-svg-container.state-calm { animation: foxSway 3s ease-in-out infinite; }
    .fox-svg-container.state-tired { animation: foxBreathe 5s ease-in-out infinite; }
    .fox-svg-container.state-low { animation: foxCurl 4s ease-in-out infinite; }

    @keyframes foxBounce { 0% { transform:translateY(0) scale(1); } 100% { transform:translateY(-14px) scale(1.08); } }
    @keyframes foxSway { 0%,100% { transform:translateY(0) rotate(0deg); } 35% { transform:translateY(-4px) rotate(3deg); } 65% { transform:translateY(2px) rotate(-2deg); } }
    @keyframes foxBreathe { 0%,100% { transform:scale(0.94); } 50% { transform:scale(1); } }
    @keyframes foxCurl { 0%,100% { transform:scale(0.88) rotate(-2deg); } 50% { transform:scale(0.92) rotate(0deg); } }

    .fox-speech-bubble {
      position: absolute;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #5a4a3a;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      opacity: 0;
      transition: all 0.6s ease;
      pointer-events: none;
      border: 1px solid #ebe3d5;
      max-width: 180px;
      text-align: center;
      z-index: 10;
    }
    .fox-speech-bubble.show { opacity: 1; bottom: 150px; }
    .fox-speech-bubble::after { content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%); width:0; height:0; border-left:8px solid transparent; border-right:8px solid transparent; border-top:8px solid white; }

    .jiajia-watermark {
      position: fixed; bottom: 25px; right: 25px; font-size: 1.3rem; font-weight: 700;
      color: white; background: var(--watermark-bg); padding: 6px 16px;
      border-radius: 25px; letter-spacing: 2px; z-index: 100; pointer-events: none;
      border: 1px solid rgba(255,255,255,0.3); transition: background 0.3s;
    }
    .toast {
      position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:10000;
      background:rgba(74,53,37,0.9); color:#faf3eb; padding:10px 20px;
      border-radius:25px; font-size:0.85rem; font-weight:600;
      opacity:0; transition:all 0.4s ease; pointer-events:none; letter-spacing:0.5px;
    }
    .toast.show { opacity:1; top:30px; }

    .main-wrapper { max-width:680px; width:100%; display:flex; flex-direction:column; gap:16px; z-index:1; margin-top:60px; }
    .container { background:var(--bg-card); border-radius:28px; box-shadow:0 16px 36px rgba(0,0,0,0.06); padding:20px 20px 24px; border:2px solid var(--border); backdrop-filter:blur(10px); }
    .daily-question { text-align:center; margin-bottom:14px; font-size:1.05rem; font-weight:600; color:var(--text-dark); background:var(--primary-lighter); padding:10px 16px; border-radius:22px; font-style:italic; }
    h1 { font-size:1.5rem; font-weight:600; color:var(--text-dark); text-align:center; display:flex; align-items:center; justify-content:center; gap:6px; background:var(--primary-lighter); padding:6px 16px; border-radius:40px; margin-bottom:10px; }
    h1 span { background:var(--badge-bg); padding:3px 10px; border-radius:30px; font-size:0.9rem; color:var(--badge-text); }
    .date-selector { display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
    .date-nav-btn,.today-btn { background:var(--primary-light); border:none; color:var(--text-dark); font-weight:600; font-size:0.8rem; padding:5px 10px; border-radius:16px; cursor:pointer; border:1px solid var(--border); font-family:inherit; }
    .today-btn { background:var(--primary); color:white; }
    .date-nav-btn:hover,.today-btn:hover { background:var(--primary-hover); color:white; }
    .date-input { background:white; border:2px solid var(--border); border-radius:16px; padding:5px 8px; font-size:0.8rem; font-weight:600; color:var(--text-dark); outline:none; text-align:center; font-family:inherit; }
    .input-panel { background:var(--primary-lighter); border-radius:20px; padding:14px; margin-bottom:16px; border:1px solid var(--border); }
    .input-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px; }
    .field.activity-field { flex:2; min-width:140px; }
    .field.energy-field { flex:1; min-width:180px; }
    label { font-size:0.6rem; font-weight:700; text-transform:uppercase; color:var(--text-medium); display:block; margin-bottom:2px; }
    input[type="text"],input[type="number"] { background:white; border:1px solid var(--border); border-radius:14px; padding:8px 10px; font-size:0.8rem; outline:none; width:100%; color:var(--text-dark); font-family:inherit; }
    .energy-slider-container { display:flex; align-items:center; gap:6px; width:100%; }
    .energy-slider-label { font-size:0.7rem; font-weight:600; color:var(--text-medium); white-space:nowrap; min-width:55px; text-align:center; }
    input[type="range"] { -webkit-appearance:none; width:100%; height:8px; border-radius:10px; background:linear-gradient(to right,#b8a090,#e8d5c0,#7A8B69); outline:none; cursor:pointer; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:28px; height:28px; border-radius:50%; background:var(--primary); cursor:pointer; border:3px solid white; box-shadow:0 2px 8px rgba(0,0,0,0.2); }
    .intent-selector { display:flex; gap:8px; margin:8px 0; flex-wrap:wrap; }
    .intent-option { display:flex; align-items:center; gap:4px; background:white; padding:5px 10px; border-radius:18px; border:2px solid var(--border); cursor:pointer; font-weight:600; font-size:0.8rem; }
    .intent-option input[type="checkbox"] { display:none; }
    .intent-option.selected-want { background:#e8f5e0; border-color:#7A8B69; color:#4a6e34; }
    .intent-option.selected-should { background:#fdf0e0; border-color:#E8A87C; color:#a06030; }
    .intent-option.selected-escape { background:#e8e0f0; border-color:#8b6faa; color:#5a4070; }
    .intent-option.selected-spark { background:#fff8d0; border-color:#d4a830; color:#8a6d20; }
    .tag-section { background:var(--primary-lightest); border-radius:14px; padding:8px 10px; border:1px solid var(--border); }
    .tag-checkboxes { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:5px; }
    .tag-checkbox-item { display:inline-flex; align-items:center; gap:3px; background:white; padding:3px 8px; border-radius:12px; border:1px solid var(--border); cursor:pointer; font-size:0.75rem; }
    .tag-checkbox-item.checked { background:var(--primary-light); border-color:var(--primary); }
    .tag-delete-btn { margin-left:2px; font-size:0.7rem; color:#999; cursor:pointer; }
    .tag-delete-btn:hover { color:#e74c3c; }
    .custom-tag-row { display:flex; gap:5px; }
    .custom-tag-input { flex:1; padding:5px 8px; border-radius:12px; border:1px solid var(--border); font-size:0.75rem; font-family:inherit; }
    .custom-tag-btn { background:var(--primary-light); border:none; padding:5px 10px; border-radius:12px; font-weight:600; font-size:0.75rem; cursor:pointer; font-family:inherit; color:var(--text-dark); }
    .add-btn { background:var(--primary); border:none; color:white; font-weight:700; font-size:0.85rem; padding:10px 16px; border-radius:25px; cursor:pointer; width:100%; margin-top:6px; font-family:inherit; }
    .add-btn:hover { background:var(--primary-hover); }
    .records-section { margin:8px 0 14px; }
    .section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .section-header h2 { font-size:0.9rem; font-weight:600; color:var(--text-dark); }
    .clear-btn { background:none; border:1px solid var(--border); color:var(--text-medium); padding:3px 8px; border-radius:14px; font-size:0.7rem; cursor:pointer; font-family:inherit; }
    .record-list { list-style:none; display:flex; flex-direction:column; gap:5px; max-height:200px; overflow-y:auto; }
    .record-item { background:white; border-radius:12px; padding:7px 12px; display:flex; justify-content:space-between; align-items:center; border:1px solid var(--border-light); flex-wrap:wrap; gap:5px; font-size:0.8rem; }
    .record-left { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .activity-text { font-weight:600; color:var(--text-dark); }
    .record-time { font-size:0.65rem; color:var(--text-medium); background:var(--tag-bg); padding:2px 6px; border-radius:8px; }
    .tag-badge { font-size:0.55rem; font-weight:700; padding:1px 5px; border-radius:8px; }
    .intent-badge { font-size:0.6rem; font-weight:700; padding:2px 6px; border-radius:10px; }
    .intent-want{background:#e8f5e0;color:#4a6e34;}
    .intent-should{background:#fdf0e0;color:#a06030;}
    .intent-escape{background:#e8e0f0;color:#5a4070;}
    .intent-spark{background:#fff8d0;color:#8a6d20;}
    .moment-badge{font-size:0.55rem;font-weight:700;padding:2px 5px;border-radius:7px;}
    .moment-high{background:#fff8e0;color:#8a6d20;}
    .moment-low{background:#fce8e8;color:#8a4040;}
    .energy-badge{padding:3px 8px;border-radius:16px;font-weight:700;font-size:0.75rem;}
    .positive{background:#e7f5e9;color:#1f5434;}
    .negative{background:#ffe9ec;color:#b3434e;}
    .neutral{background:#f3edf2;color:#5b4b55;}
    .delete-icon{background:transparent;border:none;color:#bbb;font-size:0.9rem;cursor:pointer;}
    .delete-icon:hover{color:#e74c3c;}
    .stats-panel{background:var(--bg-stat);border-radius:18px;padding:10px 12px;display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;border:1px solid var(--border);font-size:0.7rem;}
    .stat-block{flex:1;min-width:80px;}
    .stat-title{font-size:0.55rem;font-weight:700;text-transform:uppercase;color:var(--stat-label);margin-bottom:3px;}
    .total-energy{font-size:1.2rem;font-weight:700;color:var(--stat-text);}
    .avg-list li,.intent-stats li,.top-list li{color:var(--stat-text);}
    .avg-list li strong,.intent-stats li strong,.top-list li strong{color:var(--stat-text);}
    .reflection-section{background:var(--bg-card);border-radius:18px;padding:12px;border:1px solid var(--border);margin-top:4px;}
    .reflection-textarea{width:100%;min-height:70px;border-radius:12px;border:1px solid var(--border);padding:8px;font-family:inherit;resize:vertical;background:white;font-size:0.8rem;color:var(--text-dark);}
    .weekly-section{background:var(--bg-card);border-radius:18px;padding:12px;border:1px solid var(--border);margin-top:4px;}
    .tab-nav{display:flex;gap:4px;margin-bottom:10px;}
    .tab-btn{padding:4px 10px;border-radius:12px;border:1px solid var(--border);background:white;cursor:pointer;font-size:0.7rem;font-weight:600;color:var(--text-medium);font-family:inherit;}
    .tab-btn.active{background:var(--primary);color:white;border-color:var(--primary);}
    .tips-section{background:var(--primary-lightest);border-radius:14px;padding:8px 12px;margin-top:4px;border:1px solid var(--border);font-size:0.75rem;color:var(--text-medium);font-style:italic;}
    @media(max-width:768px){.main-wrapper{margin-top:50px;}.fox-draggable{right:8px!important;top:auto!important;bottom:15px!important;transform:none!important;}.fox-svg-container{width:85px;height:100px;}.forest-corner-btn{bottom:15px;left:10px;padding:8px 14px;font-size:0.75rem;}}
  </style>
</head>
<body class="theme-dusk">
  <div class="theme-switcher">
    <span style="font-size:0.65rem;font-weight:600;color:#888;align-self:center;">主题</span>
    <div class="theme-btn dusk active" data-theme="dusk" title="黄昏山林"></div>
    <div class="theme-btn sunlight" data-theme="sunlight" title="阳光穿过树叶"></div>
    <div class="theme-btn forest" data-theme="forest" title="深林暮色"></div>
  </div>
  <div class="toast" id="toast"></div>
  <button class="forest-corner-btn" id="forestCornerBtn" title="需要一个安静的角落">🌲 山林角落</button>
  <div class="forest-overlay" id="forestOverlay">
    <div class="forest-leaves" id="forestLeaves"></div>
    <div class="forest-content">
      <div class="forest-breath-circle"></div>
      <div class="forest-twinkle"></div><div class="forest-twinkle"></div><div class="forest-twinkle"></div><div class="forest-twinkle"></div><div class="forest-twinkle"></div>
      <div class="forest-hint">点击任意位置离开</div>
    </div>
  </div>
  <div class="forest-volume-control" id="forestVolumeControl">
    <label for="volumeControl">🎵</label>
    <input type="range" id="volumeControl" min="0" max="1" step="0.1" value="0.3">
  </div>
  <audio id="forestAudio" loop preload="auto"></audio>

  <!-- 小狐狸 SVG 形象，名字叫小松鼠 -->

          <polygon points="82,45 92,18 72,33" fill="#D4A373" stroke="#c08a55" stroke-width="1.5"/>
          <polygon points="40,42 34,24 48,36" fill="#F5F1E8"/>

          <ellipse cx="74" cy="58" rx="7" ry="5" fill="#F5F1E8"/>
          <ellipse cx="48" cy="48" rx="3.5" ry="4" fill="#2c1810" id="fox-left-eye"/>

  </div>

  <div class="jiajia-watermark">🌸 jiajia</div>

  <div class="main-wrapper">
    <div class="container">
      <h1>🐿️ 山林午后 <span>记录瞬间</span></h1>

      <div class="date-selector">

        <button class="date-nav-btn" id="nextDayBtn">▶</button>

      </div>
      <div class="input-panel">
        <div class="input-row">
          <div class="field activity-field"><label>📋 这个瞬间</label><input type="text" id="activityInput" placeholder="发生了什么？好的坏的奇怪的都行..." maxlength="40"></div>
          <div class="field energy-field"><label>⚡ 现在的感觉</label><div class="energy-slider-container"><span class="energy-slider-label" style="color:#8a7070;">想躲起来</span><input type="range" id="energySlider" min="-10" max="10" value="0" step="1"><span class="energy-slider-label" style="color:#7A8B69;">想拥抱世界</span></div><div style="text-align:center;font-size:0.7rem;color:var(--text-medium);margin-top:2px;" id="sliderValueDisplay">0</div></div>
        </div>

          <label class="intent-option" id="wantOption"><input type="checkbox" value="want">💚 想做</label>

        </div>
        <div class="tag-section"><div class="tag-checkboxes" id="tagCheckboxes"></div><div class="custom-tag-row"><input type="text" class="custom-tag-input" id="newTagInput" placeholder="新标签名称"><button class="custom-tag-btn" id="addTagBtn">➕ 添加</button></div></div>
        <button class="add-btn" id="addButton">✨ 记录这个瞬间</button>
      </div>
      <div class="records-section"><div class="section-header"><h2 id="recordDateTitle">📌 今天的瞬间</h2><button class="clear-btn" id="clearTodayBtn">清空当日</button></div><ul class="record-list" id="recordList"></ul></div>
      <div class="stats-panel">
        <div class="stat-block"><div class="stat-title">⚡ 今日感觉</div><div class="total-energy" id="totalEnergyDisplay">0</div></div>
        <div class="stat-block"><div class="stat-title">📊 标签</div><ul class="avg-list" id="avgEnergyList"></ul></div>
        <div class="stat-block"><div class="stat-title">🎯 瞬间类型</div><ul class="intent-stats" id="intentStatsList"></ul></div>
        <div class="stat-block"><div class="stat-title">💫 小火花</div><ul class="top-list" id="topPositiveList"></ul></div>

    </div>

    <div class="weekly-section"><div style="font-weight:600;color:var(--text-dark);margin-bottom:6px;font-size:0.85rem;">📊 能量回顾</div><div class="tab-nav"><button class="tab-btn active" data-tab="week">本周</button><button class="tab-btn" data-tab="month">本月</button></div><div id="weeklyContent" style="font-size:0.78rem;color:var(--text-medium);"></div><canvas id="weeklyChart" style="width:100%;height:100px;margin-top:8px;display:none;"></canvas></div>
  </div>

  <script>
    (function() {
      const STORAGE_KEY = 'squirrel_energy_v2';
      const DEFAULT_TAGS = ['学习', '社交', '娱乐', '休息', '其他'];
      const DAILY_QUESTIONS = ['今天有什么让你想多说两句？','今天有没有哪个瞬间，让你眼睛亮了一下？','今天有想要逃离的时刻吗？','今天发生了什么奇怪的小事？','今天你笑了吗？因为什么？','今天有没有一个时刻，你希望时间停下来？','今天你注意到什么平时忽略的东西？','今天有没有想说但没说出口的话？'];

      function getToday() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
      function formatDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
      function getTimeStr() { const n = new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; }

      function loadAll() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
      function saveAll(data) { const today=getToday(); const cutoff=new Date(today); cutoff.setDate(cutoff.getDate()-90); const cStr=formatDate(cutoff); const cleaned={}; Object.keys(data).forEach(k=>{if(k>=cStr&&k<=today) cleaned[k]=data[k];}); localStorage.setItem(STORAGE_KEY,JSON.stringify(cleaned)); }
      function loadMeta() { try { return JSON.parse(localStorage.getItem('squirrel_meta_v2')) || {}; } catch { return {}; } }
      function saveMeta(m) { localStorage.setItem('squirrel_meta_v2',JSON.stringify(m)); }
      function loadCustomTags() { try { return JSON.parse(localStorage.getItem('squirrel_tags_v2')) || []; } catch { return []; } }
      function saveCustomTags(tags) { localStorage.setItem('squirrel_tags_v2',JSON.stringify(tags)); }

      let customTags = loadCustomTags();
      let allTags = [...DEFAULT_TAGS, ...customTags];
      let selectedTags = [];
      let selectedIntents = [];
      let currentDate = getToday();
      let currentRecords = (loadAll()[currentDate] || []).map(r=>({...r, tags:r.tags||[r.tag||'其他'], intents:r.intents||(r.intent?[r.intent]:[]), isHighMoment:r.isHighMoment||false, isLowMoment:r.isLowMoment||false}));
      let meta = loadMeta();
      let currentTab = 'week';

      const $=id=>document.getElementById(id);
      const foxSvgContainer=$('foxSvgContainer'), foxSpeechBubble=$('foxSpeechBubble'), foxDraggable=$('foxDraggable');

      function showToast(msg) { const toast=$('toast'); toast.textContent=msg; toast.classList.add('show'); clearTimeout(window._toastTimer); window._toastTimer=setTimeout(()=>toast.classList.remove('show'),2500); }

      function generateWhiteNoise() {
        const audioCtx=new(window.AudioContext||window.webkitAudioContext)(); const duration=60; const sampleRate=audioCtx.sampleRate; const numSamples=duration*sampleRate; const buffer=audioCtx.createBuffer(1,numSamples,sampleRate); const data=buffer.getChannelData(0);
        for(let i=0;i<numSamples;i++){const t=i/sampleRate;let s=0;s+=(Math.random()-0.5)*0.12;s+=Math.sin(2*Math.PI*(80+Math.sin(t*0.3)*30)*t)*0.018;s+=Math.sin(2*Math.PI*(120+Math.cos(t*0.5)*40)*t)*0.012;s+=Math.sin(2*Math.PI*200*t)*0.008;const fi=Math.min(1,t/3);const fo=Math.min(1,(duration-t)/3);s*=fi*fo;data[i]=Math.max(-0.7,Math.min(0.7,s));}
        const wavData=encodeWAV(buffer); const blob=new Blob([wavData],{type:'audio/wav'}); $('forestAudio').src=URL.createObjectURL(blob); $('forestAudio').volume=0.3;
      }
      function encodeWAV(buffer){const nc=1,sr=buffer.sampleRate,bps=16;const data=buffer.getChannelData(0);const dl=data.length*(bps/8);const hl=44;const tl=hl+dl;const ab=new ArrayBuffer(tl);const v=new DataView(ab);writeString(v,0,'RIFF');v.setUint32(4,tl-8,true);writeString(v,8,'WAVE');writeString(v,12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,nc,true);v.setUint32(24,sr,true);v.setUint32(28,sr*nc*(bps/8),true);v.setUint16(32,nc*(bps/8),true);v.setUint16(34,bps,true);writeString(v,36,'data');v.setUint32(40,dl,true);let o=44;for(let i=0;i<data.length;i++){const s=Math.max(-1,Math.min(1,data[i]));v.setInt16(o,s<0?s*0x8000:s*0x7FFF,true);o+=2;}return ab;}
      function writeString(v,o,s){for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));}
      generateWhiteNoise();

      $('volumeControl').addEventListener('input',()=>{$('forestAudio').volume=parseFloat($('volumeControl').value);});
      function setDailyQuestion(){$('dailyQuestion').textContent=DAILY_QUESTIONS[new Date().getDate()%DAILY_QUESTIONS.length];}
      setDailyQuestion();
      $('energySlider').addEventListener('input',()=>{$('sliderValueDisplay').textContent=$('energySlider').value;});

      const savedTheme=localStorage.getItem('squirrel_theme_v2')||'dusk';
      document.body.className=savedTheme==='sunlight'?'theme-sunlight':(savedTheme==='forest'?'theme-forest':'theme-dusk');
      updateThemeButtons();
      document.querySelectorAll('.theme-btn').forEach(b=>b.addEventListener('click',function(){const t=this.dataset.theme;document.body.className=t==='sunlight'?'theme-sunlight':(t==='forest'?'theme-forest':'theme-dusk');localStorage.setItem('squirrel_theme_v2',t);updateThemeButtons();updateFoxColors();}));
      function updateThemeButtons(){const cls=document.body.className;document.querySelectorAll('.theme-btn').forEach(b=>{b.classList.toggle('active',(b.dataset.theme==='sunlight'&&cls==='theme-sunlight')||(b.dataset.theme==='forest'&&cls==='theme-forest')||(b.dataset.theme==='dusk'&&cls==='theme-dusk'));});}
      function updateFoxColors(){const style=getComputedStyle(document.body);const fur=style.getPropertyValue('--fox-fur').trim()||'#D4A373';const dark=style.getPropertyValue('--fox-dark').trim()||'#c08a55';const cream=style.getPropertyValue('--fox-cream').trim()||'#F5F1E8';const svg=foxSvgContainer.querySelector('svg');if(!svg)return;svg.querySelectorAll('#fox-tail path:first-child,#fox-body,#fox-back-legs ellipse,#fox-front-legs rect,#fox-head ellipse:first-child,#fox-head polygon:first-of-type,#fox-head polygon:nth-of-type(2)').forEach(el=>{el.setAttribute('fill',fur);el.setAttribute('stroke',dark);});svg.querySelectorAll('#fox-tail path:last-child,#fox-head polygon:nth-of-type(3),#fox-head polygon:nth-of-type(4),#fox-body+ellipse').forEach(el=>el.setAttribute('fill',cream));}

      $('forestCornerBtn').addEventListener('click',()=>{$('forestOverlay').classList.add('active');$('forestVolumeControl').style.display='flex';generateLeaves();document.body.style.overflow='hidden';$('forestAudio').play().catch(()=>{});});
      $('forestOverlay').addEventListener('click',(e)=>{if(e.target===$('forestOverlay')||e.target.closest('.forest-content')||e.target.closest('.forest-leaves')){$('forestOverlay').classList.remove('active');$('forestVolumeControl').style.display='none';document.body.style.overflow='';$('forestAudio').pause();$('forestAudio').currentTime=0;}});
      function generateLeaves(){const leaves=$('forestLeaves');leaves.innerHTML='';const emojis=['🍂','🍃','🌿','🍁','🌱','🪵','🌲'];for(let i=0;i<25;i++){const leaf=document.createElement('span');leaf.className='leaf';leaf.textContent=emojis[Math.floor(Math.random()*emojis.length)];leaf.style.left=Math.random()*100+'%';leaf.style.animationDuration=(8+Math.random()*15)+'s';leaf.style.animationDelay=Math.random()*10+'s';leaf.style.fontSize=(1+Math.random()*2)+'rem';leaves.appendChild(leaf);}}

      let autoWalkTimer=null;
      function startAutoWalk(){clearTimeout(autoWalkTimer);autoWalkTimer=setTimeout(autoWalk,5000+Math.random()*8000);}
      function autoWalk(){if(isDragging){startAutoWalk();return;}const maxX=window.innerWidth-130;const maxY=window.innerHeight-160;const targetX=20+Math.random()*(maxX-40);const targetY=100+Math.random()*(maxY-120);const duration=4000+Math.random()*4000;foxDraggable.style.transition=`left ${duration}ms ease-in-out, top ${duration}ms ease-in-out`;foxDraggable.style.left=targetX+'px';foxDraggable.style.top=targetY+'px';foxDraggable.style.right='auto';foxDraggable.style.transform='none';clearTimeout(autoWalkTimer);autoWalkTimer=setTimeout(()=>{foxDraggable.style.transition='filter 0.3s';startAutoWalk();},duration+500);}
      startAutoWalk();

      let isDragging=false,dragStartX,dragStartY,foxStartX,foxStartY;
      foxDraggable.addEventListener('mousedown',(e)=>{if(e.target.closest('.fox-speech-bubble'))return;isDragging=true;foxDraggable.classList.add('dragging');foxDraggable.style.transition='none';clearTimeout(autoWalkTimer);dragStartX=e.clientX;dragStartY=e.clientY;const rect=foxDraggable.getBoundingClientRect();foxStartX=rect.left;foxStartY=rect.top;e.preventDefault();});
      document.addEventListener('mousemove',(e)=>{if(!isDragging)return;foxDraggable.style.left=(foxStartX+e.clientX-dragStartX)+'px';foxDraggable.style.top=(foxStartY+e.clientY-dragStartY)+'px';foxDraggable.style.right='auto';foxDraggable.style.transform='none';});
      document.addEventListener('mouseup',()=>{if(isDragging){isDragging=false;foxDraggable.classList.remove('dragging');startAutoWalk();}});
      foxDraggable.addEventListener('touchstart',(e)=>{if(e.target.closest('.fox-speech-bubble'))return;isDragging=true;foxDraggable.classList.add('dragging');foxDraggable.style.transition='none';clearTimeout(autoWalkTimer);dragStartX=e.touches[0].clientX;dragStartY=e.touches[0].clientY;const rect=foxDraggable.getBoundingClientRect();foxStartX=rect.left;foxStartY=rect.top;},{passive:false});
      document.addEventListener('touchmove',(e)=>{if(!isDragging)return;foxDraggable.style.left=(foxStartX+e.touches[0].clientX-dragStartX)+'px';foxDraggable.style.top=(foxStartY+e.touches[0].clientY-dragStartY)+'px';foxDraggable.style.right='auto';foxDraggable.style.transform='none';},{passive:false});
      document.addEventListener('touchend',()=>{if(isDragging){isDragging=false;foxDraggable.classList.remove('dragging');startAutoWalk();}});

      const intentOptions=document.querySelectorAll('.intent-option');
      intentOptions.forEach(opt=>{opt.addEventListener('click',function(e){const cb=this.querySelector('input[type="checkbox"]');cb.checked=!cb.checked;const val=cb.value;if(cb.checked){if(!selectedIntents.includes(val))selectedIntents.push(val);}else{selectedIntents=selectedIntents.filter(v=>v!==val);}updateIntentUI();});});
      function updateIntentUI(){intentOptions.forEach(opt=>{const val=opt.querySelector('input').value;opt.classList.remove('selected-want','selected-should','selected-escape','selected-spark');if(selectedIntents.includes(val)){if(val==='want')opt.classList.add('selected-want');else if(val==='should')opt.classList.add('selected-should');else if(val==='escape')opt.classList.add('selected-escape');else if(val==='spark')opt.classList.add('selected-spark');}});}

      function updateFoxState(){const total=currentRecords.reduce((s,r)=>s+(r.energy||0),0);const cnt=currentRecords.length;foxSvgContainer.classList.remove('state-energetic','state-calm','state-tired','state-low');foxSpeechBubble.classList.remove('show');let message='';if(cnt===0){foxSvgContainer.classList.add('state-calm');message='今天还没有记录呢，慢慢来~';}else if(total>=12){foxSvgContainer.classList.add('state-energetic');message='今天感觉真好！蹦蹦跳跳~';}else if(total>=3){foxSvgContainer.classList.add('state-calm');message='平静地摇摇尾巴...';}else if(total>=-8){foxSvgContainer.classList.add('state-tired');message='有点累了，趴一会儿...';}else{foxSvgContainer.classList.add('state-low');message='蜷成一团，但我在呢。';}foxSpeechBubble.textContent=message;setTimeout(()=>foxSpeechBubble.classList.add('show'),300);clearTimeout(window._fst);window._fst=setTimeout(()=>foxSpeechBubble.classList.remove('show'),4500);}
      function autoMarkMoments(records){if(!records.length)return records;const maxE=Math.max(...records.map(r=>r.energy));const minE=Math.min(...records.map(r=>r.energy));return records.map(r=>({...r,isHighMoment:r.energy===maxE&&maxE>2,isLowMoment:r.energy===minE&&minE<-2}));}

      function rebuildTagList(){allTags=[...DEFAULT_TAGS,...customTags];renderTagCheckboxes();}
      function renderTagCheckboxes(){const tc=$('tagCheckboxes');tc.innerHTML=allTags.map(tag=>{const checked=selectedTags.includes(tag);return`<label class="tag-checkbox-item ${checked?'checked':''}" data-tag="${tag}"><input type="checkbox" value="${tag}" ${checked?'checked':''}><span>${tag}</span><span class="tag-delete-btn" data-del-tag="${tag}">✕</span></label>`;}).join('');tc.querySelectorAll('.tag-checkbox-item').forEach(item=>{const cb=item.querySelector('input');const tag=item.dataset.tag;const del=item.querySelector('.tag-delete-btn');item.addEventListener('click',function(e){if(e.target===cb||e.target===del)return;e.preventDefault();cb.checked=!cb.checked;handleTagChange(tag,cb.checked);});cb.addEventListener('change',function(){handleTagChange(tag,this.checked);});del.addEventListener('click',function(e){e.stopPropagation();e.preventDefault();deleteTag(tag);});});}
      function handleTagChange(tag,isChecked){if(isChecked){if(!selectedTags.includes(tag))selectedTags.push(tag);}else{selectedTags=selectedTags.filter(t=>t!==tag);}renderTagCheckboxes();}
      function deleteTag(tag){if(confirm(`确定删除标签「${tag}」？`)){customTags=customTags.filter(t=>t!==tag);const idx=DEFAULT_TAGS.indexOf(tag);if(idx>-1)DEFAULT_TAGS.splice(idx,1);saveCustomTags(customTags);selectedTags=selectedTags.filter(t=>t!==tag);rebuildTagList();}}
      $('addTagBtn').addEventListener('click',()=>{const name=$('newTagInput').value.trim();if(!name)return;if(allTags.includes(name))return;customTags.push(name);saveCustomTags(customTags);$('newTagInput').value='';rebuildTagList();});
      $('newTagInput').addEventListener('keypress',e=>{if(e.key==='Enter'){e.preventDefault();$('addTagBtn').click();}});

      function switchDate(ds){currentDate=ds;currentRecords=(loadAll()[ds]||[]).map(r=>({...r,tags:r.tags||[r.tag||'其他'],intents:r.intents||(r.intent?[r.intent]:[]),isHighMoment:r.isHighMoment||false,isLowMoment:r.isLowMoment||false}));$('datePicker').value=ds;$('recordDateTitle').textContent=ds===getToday()?'📌 今天的瞬间':`📌 ${ds} 的瞬间`;renderAll();}
      function renderAll(){
        const rl=$('recordList');
        rl.innerHTML=currentRecords.length?currentRecords.map(r=>{const e=r.energy,cls=e>0?'positive':(e<0?'negative':'neutral'),sign=e>0?'+':'';const tagsHtml=(r.tags||[]).map(t=>`<span class="tag-badge tag-${t}">${t}</span>`).join('');const intents=r.intents||[];const intentHtml=intents.map(iv=>{const label=iv==='want'?'💚想做':(iv==='should'?'🟠需要做':(iv==='escape'?'🏃逃离':(iv==='spark'?'✨火花':'')));const icls=iv==='want'?'intent-want':(iv==='should'?'intent-should':(iv==='escape'?'intent-escape':(iv==='spark'?'intent-spark':'')));return`<span class="intent-badge ${icls}">${label}</span>`;}).join('');let mb='';if(r.isHighMoment&&r.energy>2)mb='<span class="moment-badge moment-high">💫 高光</span>';if(r.isLowMoment&&r.energy<-2)mb='<span class="moment-badge moment-low">🌧️ 低谷</span>';return`<li class="record-item" data-id="${r.id}"><div class="record-left"><span class="activity-text">📌 ${esc(r.activity)}</span>${mb}${intentHtml}${tagsHtml}<span class="record-time">🕒${r.time}</span></div><div class="record-right"><span class="energy-badge ${cls}">${sign}${e}</span><button class="delete-icon" data-del="${r.id}">✕</button></div></li>`;}).join(''):'<li style="padding:12px;text-align:center;color:#999;">🌿 今天还没有记录，也没有关系。</li>';
        const total=currentRecords.reduce((s,r)=>s+r.energy,0);$('totalEnergyDisplay').textContent=total;
        const tagMap={};currentRecords.forEach(r=>(r.tags||[]).forEach(t=>{if(!tagMap[t])tagMap[t]={sum:0,cnt:0};tagMap[t].sum+=r.energy;tagMap[t].cnt++;}));
        $('avgEnergyList').innerHTML=Object.keys(tagMap).length?Object.entries(tagMap).map(([t,d])=>`<li><span>${t}</span><strong>${(d.sum/d.cnt)>=0?'+':''}${(d.sum/d.cnt).toFixed(1)}</strong></li>`).join(''):'<li style="color:var(--stat-text);">暂无</li>';
        const intentCounts={want:0,should:0,escape:0,spark:0};currentRecords.forEach(r=>(r.intents||[]).forEach(iv=>{if(intentCounts[iv]!==undefined)intentCounts[iv]++;}));
        $('intentStatsList').innerHTML=`<li><span>💚想做</span><strong>${intentCounts.want}次</strong></li><li><span>🟠需要做</span><strong>${intentCounts.should}次</strong></li><li><span>🏃逃离</span><strong>${intentCounts.escape}次</strong></li><li><span>✨火花</span><strong>${intentCounts.spark}次</strong></li>`;
        const sparks=currentRecords.filter(r=>(r.intents||[]).includes('spark')&&r.energy>0).sort((a,b)=>b.energy-a.energy).slice(0,3);
        $('topPositiveList').innerHTML=sparks.length?sparks.map(r=>`<li><span>${esc(r.activity)}</span><strong>✨+${r.energy}</strong></li>`).join(''):'<li style="color:var(--stat-text);">今天还没有小火花</li>';
        updateFoxState();updateTips();renderWeekly();loadReflection();
      }
      function updateTips(){const total=currentRecords.reduce((s,r)=>s+r.energy,0);const hasEscape=currentRecords.some(r=>(r.intents||[]).includes('escape'));const hasSpark=currentRecords.some(r=>(r.intents||[]).includes('spark'));let tip='';if(currentRecords.length===0)tip='今天还没有记录，也没关系。';else if(hasEscape)tip='你今天有想逃离的时刻，我注意到了。';else if(hasSpark)tip='今天有小火花呢，真好。';else if(total>15)tip='今天感觉很好呢，我在旁边蹦蹦跳跳。';else if(total<-8)tip='今天有点沉，我安静地陪着你。';else tip='平平常常的一天，也很珍贵。';$('tipsSection').innerHTML=`💭 ${tip}`;}
      function loadReflection(){const reflections=meta.reflections||{};$('reflectionText').value=reflections[currentDate]||'';}
      $('reflectionSaveBtn').addEventListener('click',()=>{const reflections=meta.reflections||{};reflections[currentDate]=$('reflectionText').value;meta.reflections=reflections;saveMeta(meta);foxSpeechBubble.textContent='嗯，我收到了。';foxSpeechBubble.classList.add('show');setTimeout(()=>foxSpeechBubble.classList.remove('show'),2500);});
      function renderWeekly(){const all=loadAll();const today=getToday();const[y,m,d]=today.split('-').map(Number);const cur=new Date(y,m-1,d);let start,label;if(currentTab==='week'){const dow=cur.getDay()||7;start=new Date(cur);start.setDate(cur.getDate()-dow+1);label='本周';}else{start=new Date(y,m-1,1);label='本月';}const days=[];for(let dt=new Date(start);dt<=cur;dt.setDate(dt.getDate()+1)){const ds=formatDate(dt);const recs=all[ds]||[];const total=recs.reduce((s,r)=>s+(r.energy||0),0);days.push({ds,total,count:recs.length});}const totalEnergy=days.reduce((s,d)=>s+d.total,0);const daysWithRecords=days.filter(d=>d.count>0).length;const weekSparks=[];days.forEach(d=>{const recs=all[d.ds]||[];recs.forEach(r=>{if((r.intents||[]).includes('spark'))weekSparks.push(r.activity);});});$('weeklyContent').innerHTML=`<p>🌿 ${label}小松鼠陪了你 <strong>${daysWithRecords}</strong> 天</p><p>⚡ ${label}总能量：<strong>${totalEnergy}</strong></p>${weekSparks.length>0?`<p>✨ ${label}小火花：${weekSparks.slice(0,5).join('、')}</p>`:`<p>${label}还没有小火花，它们会来的。</p>`}<p style="margin-top:4px;opacity:0.7;">没有数字的压力，只有陪伴。</p>`;setTimeout(()=>{const ctx=$('weeklyChart').getContext('2d');const wc=$('weeklyChart');wc.style.display='block';wc.width=wc.parentElement.clientWidth-20;wc.height=100;ctx.clearRect(0,0,wc.width,100);if(!days.length)return;const barW=Math.max(4,(wc.width-40)/days.length-4);const maxVal=Math.max(1,...days.map(d=>Math.abs(d.total)));days.forEach((d,i)=>{const x=20+i*(barW+4);const h=(Math.abs(d.total)/maxVal)*70;const y=d.total>=0?15+(70-h):15;ctx.fillStyle=d.total>=0?'#7A8B69':'#E8A87C';ctx.fillRect(x,y,barW,h);ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--text-medium').trim()||'#888';ctx.font='8px sans-serif';ctx.textAlign='center';ctx.fillText(d.ds.slice(5),x+barW/2,98);});ctx.strokeStyle='#ccc';ctx.beginPath();ctx.moveTo(20,15);ctx.lineTo(wc.width-20,15);ctx.stroke();},100);}
      document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',function(){currentTab=this.dataset.tab;document.querySelectorAll('.tab-btn').forEach(b2=>b2.classList.toggle('active',b2===this));renderWeekly();}));

      function addRecord(){const act=$('activityInput').value.trim();const eng=parseInt($('energySlider').value);if(!act){showToast('请填写这个瞬间发生了什么');return;}if(!selectedTags.length){showToast('请至少选择一个标签');return;}if(!selectedIntents.length){showToast('请至少选择一个瞬间类型（想做/需要做/想逃离/小火花）');return;}const rec={id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),activity:act,energy:eng,tags:[...selectedTags],intents:[...selectedIntents],time:getTimeStr(),isHighMoment:false,isLowMoment:false};currentRecords.push(rec);currentRecords=autoMarkMoments(currentRecords);const all=loadAll();all[currentDate]=currentRecords;saveAll(all);$('activityInput').value='';$('energySlider').value=0;$('sliderValueDisplay').textContent='0';selectedTags=[];selectedIntents=[];intentOptions.forEach(opt=>opt.querySelector('input').checked=false);renderTagCheckboxes();updateIntentUI();renderAll();}
      function deleteRec(id){currentRecords=currentRecords.filter(r=>r.id!==id);currentRecords=autoMarkMoments(currentRecords);const all=loadAll();all[currentDate]=currentRecords;saveAll(all);renderAll();}
      $('recordList').addEventListener('click',e=>{const btn=e.target.closest('[data-del]');if(btn)deleteRec(btn.dataset.del);});
      $('addButton').addEventListener('click',addRecord);
      $('clearTodayBtn').addEventListener('click',()=>{if(!currentRecords.length)return;if(confirm('清空今天的记录？')){currentRecords=[];const all=loadAll();all[currentDate]=[];saveAll(all);renderAll();}});
      $('prevDayBtn').addEventListener('click',()=>{const d=new Date(currentDate);d.setDate(d.getDate()-1);switchDate(formatDate(d));});
      $('nextDayBtn').addEventListener('click',()=>{const d=new Date(currentDate);d.setDate(d.getDate()+1);switchDate(formatDate(d));});
      $('todayBtn').addEventListener('click',()=>switchDate(getToday()));
      $('datePicker').addEventListener('change',function(){switchDate(this.value);});
      function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
      $('datePicker').value=currentDate;$('datePicker').max=getToday();
      rebuildTagList();updateIntentUI();renderAll();updateFoxColors();
    })();
  </script>
</body>
</html>
