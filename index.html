
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, viewport-fit=cover">
    <title>小松鼠能量伙伴 · 山林午后</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Georgia', 'Noto Serif SC', serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            position: relative;
            transition: background 0.8s ease, color 0.8s ease;
            user-select: none;
            background: #D4C5A9;
            --primary: #E8A87C;
            --primary-hover: #d49560;
            --primary-light: #f0dcc8;
            --primary-lighter: #faf3eb;
            --primary-lightest: #fefbf8;
            --bg-card: rgba(232, 220, 200, 0.9);
            --bg-stat: #f0e5d5;
            --border: #d4c0a0;
            --border-light: #e0d0b5;
            --text-dark: #4a3525;
            --text-medium: #6b5540;
            --tag-bg: #f0e5d8;
            --badge-bg: #E8A87C;
            --badge-text: #4a3525;
            --squirrel-fur: #D4A373;
            --squirrel-dark: #c08a55;
            --squirrel-cream: #F5F1E8;
            --stat-text: #6b5540;
            --stat-label: #6b5540;
        }
        body.theme-sunlight {
            background: #F5F1E8;
            --primary: #7A8B69;
            --primary-hover: #5a6b4a;
            --primary-light: #d5dcc8;
            --primary-lighter: #edf0e5;
            --primary-lightest: #f7f9f3;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-stat: #f5f3ed;
            --border: #e0d8c8;
            --border-light: #ebe3d5;
            --text-dark: #4a3f35;
            --text-medium: #6b5f52;
            --tag-bg: #efe8db;
            --badge-bg: #7A8B69;
            --badge-text: white;
            --squirrel-fur: #E8A87C;
            --squirrel-dark: #d49560;
            --squirrel-cream: #F5F1E8;
        }
        body.theme-forest {
            background: #2C3E2D;
            --primary: #7A8B69;
            --primary-hover: #4A5D23;
            --primary-light: #3a4e35;
            --primary-lighter: #344030;
            --primary-lightest: #2f3a2c;
            --bg-card: rgba(40, 55, 42, 0.9);
            --bg-stat: #344030;
            --border: #4A5D23;
            --border-light: #3a4e35;
            --text-dark: #D4C5A9;
            --text-medium: #D4C5A9;
            --tag-bg: #3a4e35;
            --badge-bg: #7A8B69;
            --badge-text: #D4C5A9;
            --squirrel-fur: #E8A87C;
            --squirrel-dark: #d49560;
            --squirrel-cream: #F5F1E8;
            --stat-text: #D4C5A9;
            --stat-label: #D4C5A9;
        }

        .theme-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 200;
            background: rgba(255, 255, 255, 0.7);
            padding: 6px 12px;
            border-radius: 25px;
            backdrop-filter: blur(8px);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }
        .theme-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }
        .theme-btn:hover {
            transform: scale(1.2);
        }
        .theme-btn.active {
            border-color: #333;
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.12);
        }
        .theme-btn.dusk {
            background: linear-gradient(135deg, #D4C5A9, #E8A87C);
        }
        .theme-btn.sunlight {
            background: linear-gradient(135deg, #F5F1E8, #7A8B69);
        }
        .theme-btn.forest {
            background: linear-gradient(135deg, #2C3E2D, #4A5D23);
        }

        .forest-corner-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 200;
            background: rgba(44, 62, 45, 0.85);
            color: #D4C5A9;
            border: none;
            padding: 10px 18px;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
            letter-spacing: 1px;
            transition: all 0.3s;
            font-family: inherit;
        }
        .forest-corner-btn:hover {
            background: rgba(30, 45, 30, 0.95);
            transform: translateY(-2px);
        }
        .forest-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #2C3E2D;
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            animation: forestFadeIn 1.5s ease;
        }
        .forest-overlay.active {
            display: flex;
        }
        @keyframes forestFadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .forest-content {
            text-align: center;
            position: relative;
            animation: forestBreathing 4s ease-in-out infinite;
        }
        @keyframes forestBreathing {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.9;
            }
            50% {
                transform: scale(1.03);
                opacity: 1;
            }
        }
        .forest-breath-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #7A8B69;
            margin: 0 auto 30px;
            animation: breathGlow 6s ease-in-out infinite;
            box-shadow: 0 0 40px rgba(122, 139, 105, 0.4);
        }
        @keyframes breathGlow {
            0%,
            100% {
                background: #7A8B69;
                box-shadow: 0 0 40px rgba(122, 139, 105, 0.4);
                transform: scale(0.9);
            }
            50% {
                background: #4A5D23;
                box-shadow: 0 0 60px rgba(74, 93, 35, 0.6);
                transform: scale(1.15);
            }
        }
        .forest-twinkle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #E8A87C;
            opacity: 0;
            animation: twinkle 4s ease-in-out infinite;
        }
        .forest-twinkle:nth-child(1) {
            top: -30px;
            left: 40px;
            animation-delay: 0s;
        }
        .forest-twinkle:nth-child(2) {
            top: 20px;
            right: -20px;
            animation-delay: 1.5s;
        }
        .forest-twinkle:nth-child(3) {
            bottom: -20px;
            left: 60px;
            animation-delay: 3s;
        }
        .forest-twinkle:nth-child(4) {
            top: -10px;
            right: 30px;
            animation-delay: 2s;
        }
        .forest-twinkle:nth-child(5) {
            bottom: 10px;
            left: -10px;
            animation-delay: 3.5s;
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0;
                transform: scale(0.5);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.5);
            }
        }
        .forest-hint {
            font-size: 0.75rem;
            margin-top: 20px;
            opacity: 0.4;
            letter-spacing: 1px;
            color: #D4C5A9;
        }
        .forest-leaves {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        .leaf {
            position: absolute;
            font-size: 1.5rem;
            animation: leafFall linear infinite;
            opacity: 0.5;
        }
        @keyframes leafFall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }
        .forest-volume-control {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10001;
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
        .forest-overlay.active~.forest-volume-control {
            display: flex;
        }
        .forest-volume-control label {
            color: #D4C5A9;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .treehole-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #1a1f1a;
            z-index: 9997;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: default;
            animation: fadeIn 0.8s ease;
        }
        .treehole-overlay.active {
            display: flex;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .treehole-close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(74, 93, 35, 0.6);
            color: #d4c5a9;
            border: 1px solid rgba(122, 139, 105, 0.5);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: inherit;
            transition: all 0.2s;
        }
        .treehole-close-btn:hover {
            background: rgba(74, 93, 35, 0.9);
            border-color: rgba(212, 197, 169, 0.7);
        }
        .treehole-firefly {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #d4c5a9;
            box-shadow: 0 0 8px 3px rgba(212, 197, 169, 0.6), 0 0 20px 6px rgba(122, 139, 105, 0.4);
            pointer-events: none;
            animation: fireflyFloat ease-in-out infinite;
            z-index: 2;
        }
        @keyframes fireflyFloat {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            25% {
                transform: translate(30px, -40px) scale(1.4);
                opacity: 1;
            }
            50% {
                transform: translate(-20px, -80px) scale(0.8);
                opacity: 0.5;
            }
            75% {
                transform: translate(40px, -50px) scale(1.2);
                opacity: 0.9;
            }
        }
        .treehole-cave-ambient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 50% 60%, rgba(74, 93, 35, 0.15) 0%, rgba(26, 31, 26, 0.8) 50%, #1a1f1a 100%);
            pointer-events: none;
            z-index: 0;
        }
        .treehole-cave-deep {
            position: fixed;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 120px;
            background: radial-gradient(ellipse, rgba(122, 139, 105, 0.2) 0%, rgba(74, 93, 35, 0.08) 40%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: caveBreathe 5s ease-in-out infinite;
        }
        @keyframes caveBreathe {
            0%,
            100% {
                opacity: 0.6;
                transform: translateX(-50%) scale(1);
            }
            50% {
                opacity: 1;
                transform: translateX(-50%) scale(1.15);
            }
        }
        .treehole-main-area {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .treehole-main-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            width: 90%;
            max-width: 500px;
        }
        .treehole-main-input {
            flex: 1;
            min-width: 180px;
            padding: 12px 18px;
            border-radius: 28px;
            border: 1px solid rgba(122, 139, 105, 0.4);
            background: rgba(30, 40, 30, 0.75);
            color: #d4c5a9;
            font-size: 0.9rem;
            outline: none;
            font-family: inherit;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }
        .treehole-main-input::placeholder {
            color: rgba(180, 200, 180, 0.45);
            font-style: italic;
        }
        .treehole-main-input:focus {
            border-color: rgba(212, 197, 169, 0.6);
            box-shadow: 0 0 20px rgba(122, 139, 105, 0.25);
        }
        .treehole-main-btn {
            background: rgba(74, 93, 35, 0.55);
            color: #d4c5a9;
            border: 1px solid rgba(122, 139, 105, 0.4);
            padding: 12px 20px;
            border-radius: 28px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: inherit;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }
        .treehole-main-btn:hover {
            background: rgba(74, 93, 35, 0.85);
            border-color: rgba(212, 197, 169, 0.6);
            box-shadow: 0 4px 18px rgba(74, 93, 35, 0.4);
        }
        .treehole-main-btn.recording {
            background: rgba(180, 80, 80, 0.7);
            border-color: rgba(180, 80, 80, 0.8);
            animation: recordPulse 1s ease-in-out infinite;
        }
        @keyframes recordPulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(180, 80, 80, 0.4);
            }
            50% {
                box-shadow: 0 0 0 14px rgba(180, 80, 80, 0);
            }
        }
        .treehole-enter-btn {
            background: rgba(74, 93, 35, 0.4);
            color: #d4c5a9;
            border: 1px solid rgba(122, 139, 105, 0.5);
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 2px;
            transition: all 0.4s ease;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        .treehole-enter-btn:hover {
            background: rgba(74, 93, 35, 0.75);
            border-color: rgba(212, 197, 169, 0.7);
            box-shadow: 0 6px 30px rgba(74, 93, 35, 0.5);
        }
        .treehole-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9998;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(26, 31, 26, 0.95);
            backdrop-filter: blur(12px);
        }
        .treehole-panel.active {
            display: flex;
        }
        .treehole-panel-close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(74, 93, 35, 0.6);
            color: #d4c5a9;
            border: 1px solid rgba(122, 139, 105, 0.5);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: inherit;
            transition: all 0.2s;
        }
        .treehole-panel-close-btn:hover {
            background: rgba(74, 93, 35, 0.9);
            border-color: rgba(212, 197, 169, 0.7);
        }
        .treehole-panel-header {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 550px;
            margin-bottom: 20px;
            color: #d4c5a9;
        }
        .treehole-panel-title {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #d4c5a9;
            text-shadow: 0 0 10px rgba(122, 139, 105, 0.5);
        }
        .treehole-messages-list {
            width: 90%;
            max-width: 550px;
            max-height: 55vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 8px;
        }
        .treehole-message-item {
            background: rgba(44, 60, 44, 0.6);
            border: 1px solid rgba(122, 139, 105, 0.3);
            border-radius: 16px;
            padding: 12px 16px;
            color: #d4c5a9;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .treehole-message-content {
            flex: 1;
            min-width: 150px;
            word-break: break-word;
        }
        .treehole-message-time {
            font-size: 0.7rem;
            color: rgba(180, 200, 180, 0.6);
            white-space: nowrap;
        }
        .treehole-message-actions {
            display: flex;
            gap: 6px;
        }
        .treehole-play-btn,
        .treehole-delete-btn {
            background: rgba(74, 93, 35, 0.5);
            color: #d4c5a9;
            border: 1px solid rgba(122, 139, 105, 0.3);
            padding: 4px 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.7rem;
            font-family: inherit;
        }
        .treehole-play-btn:hover {
            background: rgba(122, 139, 105, 0.6);
        }
        .treehole-delete-btn:hover {
            background: rgba(180, 80, 80, 0.6);
        }
        .treehole-empty {
            text-align: center;
            color: rgba(180, 200, 180, 0.5);
            font-style: italic;
            padding: 30px;
            font-size: 0.9rem;
        }

        .squirrel-draggable {
            position: fixed;
            left: 10px;
            top: auto;
            bottom: 20px;
            width: 80px;
            z-index: 150;
            cursor: grab;
            touch-action: none;
            filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.25));
            pointer-events: auto;
            transition: filter 0.3s;
        }
        .squirrel-draggable:active {
            cursor: grabbing;
            filter: drop-shadow(0 12px 28px rgba(0, 0, 0, 0.4));
        }
        .squirrel-draggable.dragging {
            cursor: grabbing;
            opacity: 0.85;
        }
        .squirrel-svg-container {
            width: 110px;
            height: 130px;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            pointer-events: none;
        }
        .squirrel-svg-container.state-energetic {
            animation: squirrelBounce 0.45s ease-in-out infinite alternate;
        }
        .squirrel-svg-container.state-calm {
            animation: squirrelSway 3s ease-in-out infinite;
        }
        .squirrel-svg-container.state-tired {
            animation: squirrelBreathe 5s ease-in-out infinite;
        }
        .squirrel-svg-container.state-low {
            animation: squirrelCurl 4s ease-in-out infinite;
        }
        @keyframes squirrelBounce {
            0% {
                transform: translateY(0) scale(1);
            }
            100% {
                transform: translateY(-14px) scale(1.08);
            }
        }
        @keyframes squirrelSway {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            35% {
                transform: translateY(-4px) rotate(3deg);
            }
            65% {
                transform: translateY(2px) rotate(-2deg);
            }
        }
        @keyframes squirrelBreathe {
            0%,
            100% {
                transform: scale(0.94);
            }
            50% {
                transform: scale(1);
            }
        }
        @keyframes squirrelCurl {
            0%,
            100% {
                transform: scale(0.88) rotate(-2deg);
            }
            50% {
                transform: scale(0.92) rotate(0deg);
            }
        }
        .squirrel-speech-bubble {
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #5a4a3a;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transition: all 0.6s ease;
            pointer-events: none;
            border: 1px solid #ebe3d5;
            max-width: 180px;
            text-align: center;
            z-index: 10;
        }
        .squirrel-speech-bubble.show {
            opacity: 1;
            bottom: 150px;
        }
        .squirrel-speech-bubble::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid white;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            background: rgba(74, 53, 37, 0.9);
            color: #faf3eb;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 600;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            top: 30px;
        }

        .main-wrapper {
            max-width: 680px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 1;
            margin-top: 60px;
            padding-bottom: 60px;
        }
        .container {
            background: var(--bg-card);
            border-radius: 28px;
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.06);
            padding: 20px 20px 24px;
            border: 2px solid var(--border);
            backdrop-filter: blur(10px);
        }
        .letter-header {
            text-align: center;
            margin-bottom: 14px;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-dark);
            background: var(--primary-lighter);
            padding: 10px 16px;
            border-radius: 22px;
            font-style: italic;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-dark);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;

    <script>
        (function() {

            function getToday() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

            function formatDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

                    cutoff); const cleaned = {}; Object.keys(data).forEach(k => { if (k >= cStr && k <= today) cleaned[k] = data[k]; }); localStorage
                .setItem(STORAGE_KEY, JSON.stringify(cleaned)); }

            let customTags = loadCustomTags(),

                selectedIntents = [],

            let currentRecords = (loadAll()[currentDate] || []).map(r => ({ ...r, tags: r.tags || [r.tag || '其他'], intents: r.intents || (r
                .intent ? [r.intent] : []), isHighMoment: r.isHighMoment || false, isLowMoment: r.isLowMoment || false, image: r.image ||

            const $ = id => document.getElementById(id);

            function showToast(msg) { const t = $('toast');

            function generateWhiteNoise() { const ac = new(window.AudioContext || window.webkitAudioContext)(),
                    d = 60,
                    sr = ac.sampleRate,
                    n = d * sr,
                    b = ac.createBuffer(1, n, sr),
                    data = b.getChannelData(0); for (let i = 0; i < n; i++) { const t = i / sr; let s = 0; s += (Math.random() - 0.5) * 0.12; s +=
                        Math.sin(2 * Math.PI * (80 + Math.sin(t * 0.3) * 30) * t) * 0.018; s += Math.sin(2 * Math.PI * (120 + Math.cos(t * 0.5) *
                        40) * t) * 0.012; const fi = Math.min(1, t / 3),
                        fo = Math.min(1, (d - t) / 3); s *= fi * fo; data[i] = Math.max(-0.7, Math.min(0.7, s)); } const blob = new Blob([
                    encodeWAV(b)], { type: 'audio/wav' });
                $('forestAudio').src = URL.createObjectURL(blob);
                $('forestAudio').volume = 0.3; }

            function encodeWAV(b) { const nc = 1,
                    sr = b.sampleRate,
                    bps = 16,
                    data = b.getChannelData(0),
                    dl = data.length * (bps / 8),
                    hl = 44,
                    tl = hl + dl,
                    ab = new ArrayBuffer(tl),
                    v = new DataView(ab);
                writeString(v, 0, 'RIFF');
                v.setUint32(4, tl - 8, true);
                writeString(v, 8, 'WAVE');
                writeString(v, 12, 'fmt ');
                v.setUint32(16, 16, true);
                v.setUint16(20, 1, true);
                v.setUint16(22, nc, true);
                v.setUint32(24, sr, true);
                v.setUint32(28, sr * nc * (bps / 8), true);
                v.setUint16(32, nc * (bps / 8), true);
                v.setUint16(34, bps, true);
                writeString(v, 36, 'data');
                v.setUint32(40, dl, true); let o = 44; for (let i = 0; i < data.length; i++) { const s = Math.max(-1, Math.min(1, data[i]));
                    v.setInt16(o, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                    o += 2; } return ab; }

            function writeString(v, o, s) { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); }
            generateWhiteNoise();
            $('volumeControl').addEventListener('input', () => { $('forestAudio').volume = parseFloat($('volumeControl').value); });

            function setLetterPrompt() { $('letterHeader').textContent = '✍️ ' + LETTER_PROMPTS[new Date().getDate() % LETTER_PROMPTS
            .length]; }
            setLetterPrompt();
            $('energySlider').addEventListener('input', () => { $('sliderValueDisplay').textContent = $('energySlider').value; });

            const savedTheme = localStorage.getItem('sq_theme_v10') || 'dusk';
            document.body.className = savedTheme === 'sunlight' ? 'theme-sunlight' : (savedTheme === 'forest' ? 'theme-forest' :
                'theme-dusk');
            updateThemeButtons();
            document.querySelectorAll('.theme-btn').forEach(b => b.addEventListener('click', function() { const t = this.dataset
                    .theme;
                document.body.className = t === 'sunlight' ? 'theme-sunlight' : (t === 'forest' ? 'theme-forest' : 'theme-dusk');
                localStorage.setItem('sq_theme_v10', t);

            function updateThemeButtons() { const cls = document.body.className; document.querySelectorAll('.theme-btn').forEach(b => { b

            function updateSquirrelColors() { const style = getComputedStyle(document.body); const fur = style.getPropertyValue(

                    ).forEach(el => { el.setAttribute('fill', fur);
                    el.setAttribute('stroke', dark); }); svg.querySelectorAll(
                    '#sq-tail path:last-child,#sq-head polygon:nth-of-type(3),#sq-head polygon:nth-of-type(4)').forEach(el => el
                    .setAttribute('fill', cream)); }

            $('forestCornerBtn').addEventListener('click', () => { $('forestOverlay').classList.add('active');
                $('forestVolumeControl').style.display = 'flex';

            $('forestOverlay').addEventListener('click', (e) => { if (e.target === $('forestOverlay') || e.target.closest(
                    '.forest-content') || e.target.closest('.forest-leaves')) { $('forestOverlay').classList.remove('active');
                    $('forestVolumeControl').style.display = 'none';

                    $('forestAudio').pause();
                    $('forestAudio').currentTime = 0; } });

            function generateLeaves() { const leaves = $('forestLeaves');
                leaves.innerHTML = ''; const emojis = ['🍂', '🍃', '🌿', '🍁', '🌱']; for (let i = 0; i < 25; i++) { const leaf = document
                        .createElement('span');

                    leaf.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    leaf.style.left = Math.random() * 100 + '%';
                    leaf.style.animationDuration = (8 + Math.random() * 15) + 's';
                    leaf.style.animationDelay = Math.random() * 10 + 's';
                    leaf.style.fontSize = (1 + Math.random() * 2) + 'rem';
                    leaves.appendChild(leaf); } }

            // 树洞逻辑
            const treeholeOverlay = $('treeholeOverlay'),
                treeholePanel = $('treeholePanel');

            function generateTreeholeFireflies() { const container = $('treeholeFireflies');
                container.innerHTML = ''; for (let i = 0; i < 30; i++) { const ff = document.createElement('div');
                    ff.className = 'treehole-firefly';
                    ff.style.left = (3 + Math.random() * 94) + '%';
                    ff.style.top = (5 + Math.random() * 85) + '%';
                    ff.style.animationDuration = (5 + Math.random() * 12) + 's';
                    ff.style.animationDelay = (Math.random() * 8) + 's'; const s = (2 + Math.random() * 4);
                    ff.style.width = s + 'px';
                    ff.style.height = s + 'px';
                    container.appendChild(ff); } }
            generateTreeholeFireflies();

            function addTreeholeMessage(msg, type, audioSrc) { const msgs = loadTreehole(); const now = new Date(); msgs.push({ msg,
                    type: type || 'text', src: audioSrc || '', time: now.toLocaleTimeString('zh-CN', { hour: '2-digit',
                        minute: '2-digit' }), date: now.toISOString().split('T')[0] }); saveTreehole(msgs);
                renderTreeholeMessages();
                showToast(type === 'audio' ? '语音已送入树洞 🪲' : '已送入树洞 🪲'); }

            function renderTreeholeMessages() { const msgs = loadTreehole(); const list = $('treeholeMessagesList'); if (msgs.length ===
                    0) { list.innerHTML = '<div class="treehole-empty">🪲 萤火虫在飞舞，树洞在聆听...</div>'; return; } list.innerHTML = msgs
                    .slice().reverse().map((m, i) => { const isAudio = m.type === 'audio'; const content = isAudio ?
                            '🎤 一段语音' : escHtml(m.msg); const playBtn = isAudio ?
                            `<button class="treehole-play-btn" data-src="${escHtml(m.src||'')}">▶ 回放</button>` : ''; return `
                <div class="treehole-message-item"><span class="treehole-message-content">${content}</span><span class="treehole-message-time">${m.date} ${m.time}</span><div class="treehole-message-actions">${playBtn}<button class="treehole-delete-btn" data-index="${msgs.length-1-i}">✕</button></div></div>`; })
                    .join(''); list.querySelectorAll('.treehole-play-btn').forEach(b => b.addEventListener('click', function() { $(
                        'treeholeAudioPlayer').src = this.dataset.src;
                    $('treeholeAudioPlayer').play().catch(() => showToast('无法播放录音')); })); list.querySelectorAll(
                    '.treehole-delete-btn').forEach(b => b.addEventListener('click', function() { const msgs = loadTreehole();
                        msgs.splice(parseInt(this.dataset.index), 1);
                        saveTreehole(msgs);
                        renderTreeholeMessages();
                        showToast('已从树洞中消失'); })); }

            function escHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
            $('treeholeEntrySection').addEventListener('click', (e) => { e.stopPropagation();
                treeholeOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
                setTimeout(() => $('treeholeMainInput').focus(), 500); });

            function closeTreeholeOverlay() { treeholeOverlay.classList.remove('active');
                document.body.style.overflow = '';
                $('treeholeAudioPlayer').pause();
                $('treeholeAudioPlayer').currentTime = 0;
                treeholePanel.classList.remove('active'); }
            $('treeholeOverlayCloseBtn').addEventListener('click', (e) => { e.stopPropagation();
                closeTreeholeOverlay(); });
            treeholeOverlay.addEventListener('click', (e) => { if (e.target === treeholeOverlay) { closeTreeholeOverlay(); } });
            $('treeholeMainSendBtn').addEventListener('click', (e) => { e.stopPropagation(); const msg = $('treeholeMainInput').value
                    .trim(); if (!msg) return showToast('想说点什么？');
                addTreeholeMessage(msg, 'text');
                $('treeholeMainInput').value = '';
                $('treeholeMainInput').focus(); });
            $('treeholeMainInput').addEventListener('keypress', e => { if (e.key === 'Enter') { e.preventDefault();
                    $('treeholeMainSendBtn').click(); } });
            let thRecording = false,
                thMediaRecorder, thChunks;
            $('treeholeMainRecordBtn').addEventListener('click', (e) => { e.stopPropagation(); if (!navigator.mediaDevices) return showToast(
                    '录音需要HTTPS或本地环境'); if (thRecording) { if (thMediaRecorder && thMediaRecorder.state === 'recording')
                    thMediaRecorder.stop(); return; }
                navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => { thChunks = [];
                    thMediaRecorder = new MediaRecorder(stream);
                    thMediaRecorder.ondataavailable = e => thChunks.push(e.data);
                    thMediaRecorder.onstop = () => { const blob = new Blob(thChunks, { type: 'audio/webm' });
                        addTreeholeMessage('语音消息', 'audio', URL.createObjectURL(blob));
                        stream.getTracks().forEach(t => t.stop());

                    showToast('正在聆听...'); }).catch(() => showToast('无法访问麦克风')); });
            $('treeholeEnterBtn').addEventListener('click', (e) => { e.stopPropagation();

            $('treeholePanelCloseBtn').addEventListener('click', (e) => { e.stopPropagation();

                        'active');
                    $('treeholeAudioPlayer').pause();
                    $('treeholeAudioPlayer').currentTime = 0; } });

            // === 图片功能 ===
            // 压缩图片
            function compressImage(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = new Image();
                        img.onload = function() {
                            const canvas = document.createElement('canvas');
                            let w = img.width,
                                h = img.height;
                            const maxW = 400;
                            if (w > maxW) { h = Math.round(h * maxW / w);
                                w = maxW; }
                            canvas.width = w;
                            canvas.height = h;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, w, h);
                            resolve(canvas.toDataURL('image/jpeg', 0.65));
                        };
                        img.onerror = reject;
                        img.src = e.target.result;
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            }

            // 更新图片预览状态
            function updateImagePreviewUI() {
                const btn = $('imageAddBtn');
                const preview = $('imagePreviewMini');
                if (pendingImage) {
                    btn.classList.add('has-image');
                    btn.textContent = '🖼️';
                    preview.src = pendingImage;
                    preview.classList.add('visible');
                } else {
                    btn.classList.remove('has-image');
                    btn.textContent = '📷';
                    preview.src = '';
                    preview.classList.remove('visible');
                }
            }

            // 添加图片按钮 - 创建file input触发选择
            $('imageAddBtn').addEventListener('click', (e) => {
                e.preventDefault();

                if (pendingImage) {

                        pendingImage = null;
                        updateImagePreviewUI();
                        // 继续打开选择器
                        triggerImagePicker();
                    }
                } else {
                    triggerImagePicker();
                }
            });

            // 点击预览图也可重新选择
            $('imagePreviewMini').addEventListener('click', (e) => {
                e.stopPropagation();
                if (pendingImage) {
                    if (confirm('要替换当前图片吗？')) {
                        pendingImage = null;
                        updateImagePreviewUI();
                        triggerImagePicker();
                    }
                }
            });

            function triggerImagePicker() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                // 在移动端，capture会直接打开相机；不设置capture则会弹出选择菜单（拍照/相册）
                // 这里使用accept="image/*"，移动端浏览器会自动弹出选择
                input.style.display = 'none';
                document.body.appendChild(input);
                input.addEventListener('change', async function() {
                    if (this.files && this.files[0]) {
                        try {
                            showToast('正在处理图片...');
                            const base64 = await compressImage(this.files[0]);
                            pendingImage = base64;
                            updateImagePreviewUI();
                            showToast('图片已就绪 📷');
                        } catch (err) {
                            showToast('图片处理失败，请重试');
                            console.error('图片压缩失败:', err);
                        }
                    }
                    document.body.removeChild(input);
                });
                // 处理取消选择
                input.addEventListener('cancel', function() {
                    document.body.removeChild(input);
                });
                // 在移动端，用户取消时不会触发cancel，用focus loss来处理
                const cleanup = () => {
                    setTimeout(() => {
                        if (document.body.contains(input) && !input.files?.length) {
                            // 用户可能取消了
                        }
                        if (document.body.contains(input)) {
                            try { document.body.removeChild(input); } catch (e) {}
                        }
                    }, 500);
                };
                input.addEventListener('blur', cleanup);
                input.click();
                // 在移动端focus后可能触发
                window.addEventListener('focus', function onFocus() {
                    setTimeout(() => {
                        if (document.body.contains(input) && !input.files?.length) {
                            try { document.body.removeChild(input); } catch (e) {}
                        }
                        window.removeEventListener('focus', onFocus);
                    }, 800);
                }, { once: true });
            }

            // 图片查看浮层
            const imageViewerOverlay = $('imageViewerOverlay');
            const imageViewerImg = $('imageViewerImg');
            const imageViewerCloseBtn = $('imageViewerCloseBtn');

            function openImageViewer(src) {

            function closeImageViewer() {

            }
            imageViewerCloseBtn.addEventListener('click', (e) => { e.stopPropagation();
                closeImageViewer(); });
            imageViewerOverlay.addEventListener('click', (e) => { if (e.target === imageViewerOverlay || e.target === imageViewerImg
                    .closest('div')) { closeImageViewer(); } });

            // === 小松鼠拖动（优化版 - 全屏移动 + 边界限制） ===
            let isDragging = false;
            let offsetX, offsetY;
            const SQUIRREL_W = 110,
                SQUIRREL_H = 130;

            function clampSquirrelPosition(x, y) {
                const maxLeft = window.innerWidth - 30;
                const maxTop = window.innerHeight - 30;
                const minLeft = -SQUIRREL_W + 20;
                const minTop = -SQUIRREL_H + 20;
                return {
                    left: Math.max(minLeft, Math.min(maxLeft, x)),
                    top: Math.max(minTop, Math.min(maxTop, y))
                };
            }

            squirrelDraggable.addEventListener('touchstart', (e) => {
                isDragging = true;
                const touch = e.touches[0];
                const rect = squirrelDraggable.getBoundingClientRect();
                offsetX = touch.clientX - rect.left;
                offsetY = touch.clientY - rect.top;
                squirrelDraggable.style.bottom = 'auto';
                squirrelDraggable.style.right = 'auto';
                squirrelDraggable.style.transition = 'none';
                squirrelDraggable.classList.add('dragging');
                clearTimeout(window._autoWalkTimer);
            }, { passive: false });

            window.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                e.preventDefault();
                const touch = e.touches[0];
                const pos = clampSquirrelPosition(touch.clientX - offsetX, touch.clientY - offsetY);
                squirrelDraggable.style.left = pos.left + 'px';
                squirrelDraggable.style.top = pos.top + 'px';
            }, { passive: false });

            window.addEventListener('touchend', () => {
                if (isDragging) {
                    isDragging = false;
                    squirrelDraggable.classList.remove('dragging');
                    startAutoWalk();
                }
            });

            // 鼠标拖动（电脑端兼容）
            squirrelDraggable.addEventListener('mousedown', (e) => {
                isDragging = true;
                const rect = squirrelDraggable.getBoundingClientRect();
                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;
                squirrelDraggable.style.bottom = 'auto';
                squirrelDraggable.style.right = 'auto';
                squirrelDraggable.style.transition = 'none';
                squirrelDraggable.classList.add('dragging');
                clearTimeout(window._autoWalkTimer);
            });
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const pos = clampSquirrelPosition(e.clientX - offsetX, e.clientY - offsetY);
                squirrelDraggable.style.left = pos.left + 'px';
                squirrelDraggable.style.top = pos.top + 'px';
            });
            window.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    squirrelDraggable.classList.remove('dragging');
                    startAutoWalk();
                }
            });

            squirrelDraggable.addEventListener('click', (e) => {
                if (isDragging) return;
                const msgs = ['你来了呀~', '今天也辛苦了。', '没关系，慢慢来。', '我一直在呢。'];
                squirrelSpeechBubble.textContent = msgs[Math.floor(Math.random() * msgs.length)];
                squirrelSpeechBubble.classList.add('show');
                clearTimeout(window._fst);
                window._fst = setTimeout(() => squirrelSpeechBubble.classList.remove('show'), 3000);
            });

            // 自动走动（全屏范围）
            let autoWalkTimer = null;

            function startAutoWalk() { clearTimeout(autoWalkTimer);
                autoWalkTimer = setTimeout(autoWalk, 5000 + Math.random() * 8000); }

            function autoWalk() {
                if (isDragging) { startAutoWalk(); return; }
                const vw = window.innerWidth,
                    vh = window.innerHeight;
                const tx = 10 + Math.random() * (vw - SQUIRREL_W - 20);
                const ty = 10 + Math.random() * (vh - SQUIRREL_H - 40);
                squirrelDraggable.style.transition =
                    `left ${4000+Math.random()*4000}ms ease-in-out, top ${4000+Math.random()*4000}ms ease-in-out`;
                squirrelDraggable.style.left = tx + 'px';
                squirrelDraggable.style.top = ty + 'px';
                squirrelDraggable.style.bottom = 'auto';
                squirrelDraggable.style.right = 'auto';
                clearTimeout(autoWalkTimer);
                autoWalkTimer = setTimeout(() => { squirrelDraggable.style.transition = 'filter 0.3s';
                    startAutoWalk(); }, 4500);
            }
            startAutoWalk();

            function checkNightTime() { const h = new Date().getHours(); if (h >= 0 && h < 6 && !nightReminderShown) {
                    nightReminderShown = true;
                    setTimeout(() => { squirrelSpeechBubble.textContent = '夜深了，该休息啦~💤';
                        squirrelSpeechBubble.classList.add('show');
                        clearTimeout(window._fst);
                        window._fst = setTimeout(() => squirrelSpeechBubble.classList.remove('show'), 4000); }, 2000); } }
            checkNightTime();

            // 意图选择器
            const intentOptions = document.querySelectorAll('.intent-option');
            intentOptions.forEach(opt => { opt.addEventListener('click', function(e) { const cb = this.querySelector('input');
                    cb.checked = !cb.checked; const val = cb.value; if (cb.checked) { if (!selectedIntents.includes(val))
                        selectedIntents.push(val); } else { selectedIntents = selectedIntents.filter(v => v !== val); }
                    updateIntentUI(); }); });

            function updateIntentUI() { intentOptions.forEach(opt => { const val = opt.querySelector('input').value; opt.classList
                        .remove('selected-want', 'selected-should', 'selected-escape', 'selected-spark'); if (selectedIntents
                        .includes(val)) { if (val === 'want') opt.classList.add('selected-want'); else if (val === 'should') opt
                            .classList.add('selected-should'); else if (val === 'escape') opt.classList.add('selected-escape'); else if (
                            val === 'spark') opt.classList.add('selected-spark'); } }); }

            function updateSquirrelState() { const total = currentRecords.reduce((s, r) => s + (r.energy || 0), 0); const cnt =
                    currentRecords.length;
                squirrelSvgContainer.classList.remove('state-energetic', 'state-calm', 'state-tired', 'state-low');
                squirrelSpeechBubble.classList.remove('show'); let m = ''; if (cnt === 0) { squirrelSvgContainer.classList.add(
                        'state-calm');
                    m = '今天还没有记录呢，慢慢来~'; } else if (total >= 12) { squirrelSvgContainer.classList.add('state-energetic');
                    m = '今天感觉真好！蹦蹦跳跳~'; } else if (total >= 3) { squirrelSvgContainer.classList.add('state-calm');
                    m = '平静地摇摇尾巴...'; } else if (total >= -8) { squirrelSvgContainer.classList.add('state-tired');
                    m = '有点累了，趴一会儿...'; } else { squirrelSvgContainer.classList.add('state-low');
                    m = '蜷成一团，但我在呢。'; }
                squirrelSpeechBubble.textContent = m;
                setTimeout(() => squirrelSpeechBubble.classList.add('show'), 300);
                clearTimeout(window._fst);
                window._fst = setTimeout(() => squirrelSpeechBubble.classList.remove('show'), 4500); }

            function autoMarkMoments(records) { if (!records.length) return records; const maxE = Math.max(...records.map(r => r
                    .energy)); const minE = Math.min(...records.map(r => r.energy)); return records.map(r => ({ ...r,
                    isHighMoment: r.energy === maxE && maxE > 2, isLowMoment: r.energy === minE && minE < -2 })); }

            function rebuildTagList() { allTags = [...DEFAULT_TAGS, ...customTags];
                renderTagCheckboxes(); }

            function renderTagCheckboxes() { $('tagCheckboxes').innerHTML = allTags.map(tag => { const c = selectedTags.includes(
                        tag); return `<label class="tag-checkbox-item ${c?'checked':''}" data-tag="${tag}"><input type="checkbox" value="${tag}" ${c?'checked':''}><span>${tag}</span><span class="tag-delete-btn" data-del-tag="${tag}">✕</span></label>`; })
                    .join(''); document.querySelectorAll('.tag-checkbox-item').forEach(item => { const cb = item.querySelector(
                        'input'),
                        tag = item.dataset.tag,
                        del = item.querySelector('.tag-delete-btn');
                    item.addEventListener('click', function(e) { if (e.target === cb || e.target === del) return;
                        e.preventDefault();
                        cb.checked = !cb.checked;
                        handleTagChange(tag, cb.checked); });
                    cb.addEventListener('change', function() { handleTagChange(tag, this.checked); });
                    del.addEventListener('click', function(e) { e.stopPropagation();
                        e.preventDefault();
                        deleteTag(tag); }); }); }

            function handleTagChange(tag, isChecked) { if (isChecked) { if (!selectedTags.includes(tag)) selectedTags.push(tag); } else {
                    selectedTags = selectedTags.filter(t => t !== tag); }
                renderTagCheckboxes(); }

            function deleteTag(tag) { if (confirm(`确定删除标签「${tag}」？`)) { customTags = customTags.filter(t => t !== tag); const idx =
                        DEFAULT_TAGS.indexOf(tag); if (idx > -1) DEFAULT_TAGS.splice(idx, 1);
                    saveCustomTags(customTags);
                    selectedTags = selectedTags.filter(t => t !== tag);
                    rebuildTagList(); } }
            $('addTagBtn').addEventListener('click', () => { const n = $('newTagInput').value.trim(); if (!n) return; if (allTags
                    .includes(n)) return;
                customTags.push(n);
                saveCustomTags(customTags);
                $('newTagInput').value = '';
                rebuildTagList(); });

            function switchDate(ds) { currentDate = ds;
                currentRecords = (loadAll()[ds] || []).map(r => ({ ...r, tags: r.tags || [r.tag || '其他'], intents: r.intents || (r
                    .intent ? [r.intent] : []), isHighMoment: r.isHighMoment || false, isLowMoment: r.isLowMoment || false,
                    image: r.image || null }));
                $('datePicker').value = ds;
                $('recordDateTitle').textContent = ds === getToday() ? '📌 今天的瞬间' : `📌 ${ds} 的瞬间`;
                renderAll(); }

            function renderAll() {
                $('recordList').innerHTML = currentRecords.length ? currentRecords.map(r => { const e = r.energy,
                        cls = e > 0 ? 'positive' : (e < 0 ? 'negative' : 'neutral'),
                        sign = e > 0 ? '+' : ''; const tH = (r.tags || []).map(t =>
                        `<span class="tag-badge tag-${t}">${t}</span>`).join(''); const iH = (r.intents || []).map(iv =>
                        `<span class="intent-badge intent-${iv}">${iv==='want'?'💚想做':(iv==='should'?'🟠需要做':(iv==='escape'?'🏃逃离':'✨火花'))}</span>`
                        ).join(''); let mb = ''; if (r.isHighMoment && r.energy > 2) mb =
                        '<span class="moment-badge moment-high">💫 高光</span>'; if (r.isLowMoment && r.energy < -2) mb =
                        '<span class="moment-badge moment-low">🌧️ 低谷</span>';
                    const thumbHtml = r.image ?
                        `<img class="record-thumbnail" src="${escHtml(r.image)}" alt="图片" onclick="event.stopPropagation();document.getElementById('imageViewerOverlay').classList.add('active');document.getElementById('imageViewerImg').src=this.src;document.body.style.overflow='hidden';" title="点击查看大图">` :
                        ''; return `
                <li class="record-item"><div class="record-left">${thumbHtml}<span class="activity-text">📌 ${esc(r.activity)}</span>${mb}${iH}${tH}<span class="record-time">🕒${r.time}</span></div><div class="record-right"><span class="energy-badge ${cls}">${sign}${e}</span><button class="delete-icon" data-del="${r.id}">✕</button></div></li>`; })
                    .join('') :
                    '<li style="padding:12px;text-align:center;color:#999;">🌿 今天还没有记录，也没有关系。</li>';
                const total = currentRecords.reduce((s, r) => s + r.energy, 0);
                $('totalEnergyDisplay').textContent = total;
                const tagMap = {};
                currentRecords.forEach(r => (r.tags || []).forEach(t => { if (!tagMap[t]) tagMap[t] = { sum: 0, cnt: 0 };
                    tagMap[t].sum += r.energy;
                    tagMap[t].cnt++; }));
                $('avgEnergyList').innerHTML = Object.keys(tagMap).length ? Object.entries(tagMap).map(([t, d]) =>
                    `<li><span>${t}</span><strong>${(d.sum/d.cnt)>=0?'+':''}${(d.sum/d.cnt).toFixed(1)}</strong></li>`).join(
                    '') : '<li style="color:var(--stat-text);">暂无</li>';
                const ic = { want: 0, should: 0, escape: 0, spark: 0 };
                currentRecords.forEach(r => (r.intents || []).forEach(iv => { if (ic[iv] !== undefined) ic[iv]++; }));
                $('intentStatsList').innerHTML =
                    `<li><span>💚想做</span><strong>${ic.want}次</strong></li><li><span>🟠需要做</span><strong>${ic.should}次</strong></li><li><span>🏃逃离</span><strong>${ic.escape}次</strong></li><li><span>✨火花</span><strong>${ic.spark}次</strong></li>`;
                const sparks = currentRecords.filter(r => (r.intents || []).includes('spark') && r.energy > 0).sort((a, b) => b.energy -
                    a.energy).slice(0, 3);
                $('topPositiveList').innerHTML = sparks.length ? sparks.map(r =>
                    `<li><span>${esc(r.activity)}</span><strong>✨+${r.energy}</strong></li>`).join('') :
                    '<li style="color:var(--stat-text);">今天还没有小火花</li>';
                updateSquirrelState();
                updateTips();
                renderPastSelf();
                renderWeekly();
                loadReflection();
                // 重新绑定缩略图点击事件（也支持动态添加的）
                bindThumbnailClicks();
            }

            function bindThumbnailClicks() {
                document.querySelectorAll('.record-thumbnail').forEach(img => {
                    if (!img._boundClick) {
                        img._boundClick = true;
                        img.addEventListener('click', function(e) {
                            e.stopPropagation();
                            openImageViewer(this.src);
                        });
                    }
                });
            }

            function updateTips() { const total = currentRecords.reduce((s, r) => s + r.energy, 0); let tip = ''; if (currentRecords
                    .length === 0) tip = '今天还没有记录，也没关系。'; else if (total > 15) tip = '今天感觉很好呢！'; else if (total < -8) tip =
                    '今天有点沉，我安静地陪着你。'; else tip = '平平常常的一天，也很珍贵。';
                $('tipsSection').innerHTML = `💭 ${tip}`; }

            function loadReflection() { const reflections = meta.reflections || {};
                $('reflectionText').value = reflections[currentDate] || ''; }
            $('reflectionSaveBtn').addEventListener('click', () => { const reflections = meta.reflections || {};
                reflections[currentDate] = $('reflectionText').value;
                meta.reflections = reflections;
                saveMeta(meta);
                squirrelSpeechBubble.textContent = '信收到了~';
                squirrelSpeechBubble.classList.add('show');
                setTimeout(() => squirrelSpeechBubble.classList.remove('show'), 2500); });

            function renderPastSelf() { const all = loadAll(); const dates = Object.keys(all).filter(d => d !== getToday()).sort(); if (
                    dates.length === 0) { $('pastSelfContent').innerHTML = '🌿 还没有过去的记忆。'; return; } const candidates = [],
                    today = new Date(getToday()),
                    wa = new Date(today);
                wa.setDate(wa.getDate() - 7); const ma = new Date(today);
                ma.setDate(ma.getDate() - 30); if (dates.includes(formatDate(wa))) candidates.push({ label: '一周前', ds: formatDate(
                        wa) }); if (dates.includes(formatDate(ma))) candidates.push({ label: '一个月前', ds: formatDate(ma) }); if (!candidates
                    .length) { const rd = dates[Math.floor(Math.random() * dates.length)];
                    candidates.push({ label: `${Math.floor((today-new Date(rd))/(86400000))}天前`, ds: rd }); } const ch = candidates[Math
                    .floor(Math.random() * candidates.length)]; const recs = all[ch.ds] || []; if (!recs.length) { $(
                        'pastSelfContent').innerHTML = '🌿 还没有过去的记忆。'; return; }
                $('pastSelfContent').innerHTML =
                    `📅 <strong>${ch.label}</strong>（${ch.ds}）<br>💭 原来那时候我在乎：${recs.slice(0,3).map(r=>esc(r.activity)).join('、')}`; }

            function renderWeekly() { const all = loadAll(); const today = getToday(); const [y, m, d] = today.split('-').map(Number); const
                    cur = new Date(y, m - 1, d); let start, label; if (currentTab === 'week') { const dow = cur.getDay() || 7;
                    start = new Date(cur);
                    start.setDate(cur.getDate() - dow + 1);
                    label = '本周'; } else { start = new Date(y, m - 1, 1);
                    label = '本月'; } const days = []; for (let dt = new Date(start); dt <= cur; dt.setDate(dt.getDate() + 1)) { const ds =
                        formatDate(dt); const recs = all[ds] || [];
                    days.push({ ds, total: recs.reduce((s, r) => s + (r.energy || 0), 0), count: recs.length }); } const te = days.reduce(
                    (s, d) => s + d.total, 0),
                    dc = days.filter(d => d.count > 0).length;
                $('weeklyContent').innerHTML =
                    `<p>🌿 ${label}小松鼠陪了你 <strong>${dc}</strong> 天</p><p>⚡ ${label}总能量：<strong>${te}</strong></p><p style="margin-top:4px;opacity:0.7;">没有数字的压力，只有陪伴。</p>`; }
            document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', function() { currentTab = this.dataset
                    .tab;
                document.querySelectorAll('.tab-btn').forEach(b2 => b2.classList.toggle('active', b2 === this));
                renderWeekly(); }));

            function addRecord() { const act = $('activityInput').value.trim(),
                    eng = parseInt($('energySlider').value); if (!act) return showToast('请填写这个瞬间'); if (!selectedTags.length)
                    return showToast('请至少选择一个标签'); if (!selectedIntents.length) return showToast('请至少选择一个瞬间类型'); const rec = { id: Date
                        .now().toString(36) + Math.random().toString(36).slice(2, 6), activity: act, energy: eng, tags: [
                        ...selectedTags], intents: [...selectedIntents], time: getTimeStr(), image: pendingImage ||
                        null };
                currentRecords.push(rec);
                currentRecords = autoMarkMoments(currentRecords); const all = loadAll();
                all[currentDate] = currentRecords;
                saveAll(all);
                $('activityInput').value = '';
                $('energySlider').value = 0;
                $('sliderValueDisplay').textContent = '0';
                selectedTags = [];
                selectedIntents = [];
                intentOptions.forEach(o => o.querySelector('input').checked = false);
                pendingImage = null;
                updateImagePreviewUI();
                renderTagCheckboxes();
                updateIntentUI();
                renderAll(); }

            function deleteRec(id) { currentRecords = currentRecords.filter(r => r.id !== id);
                currentRecords = autoMarkMoments(currentRecords); const all = loadAll();
                all[currentDate] = currentRecords;
                saveAll(all);
                renderAll(); }
            $('recordList').addEventListener('click', e => { const btn = e.target.closest('[data-del]'); if (btn) deleteRec(btn.dataset
                    .del); });
            $('addButton').addEventListener('click', addRecord);
            $('clearTodayBtn').addEventListener('click', () => { if (!currentRecords.length) return; if (confirm('清空？')) {
                    currentRecords = []; const all = loadAll();
                    all[currentDate] = [];
                    saveAll(all);
                    renderAll(); } });
            $('prevDayBtn').addEventListener('click', () => { const d = new Date(currentDate);
                d.setDate(d.getDate() - 1);
                switchDate(formatDate(d)); });
            $('nextDayBtn').addEventListener('click', () => { const d = new Date(currentDate);
                d.setDate(d.getDate() + 1);
                switchDate(formatDate(d)); });
            $('todayBtn').addEventListener('click', () => switchDate(getToday()));
            $('datePicker').addEventListener('change', function() { switchDate(this.value); });

            function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
            $('datePicker').value = currentDate;
            $('datePicker').max = getToday();
            rebuildTagList();
            updateIntentUI();
            renderAll();
            updateSquirrelColors();
            renderTreeholeMessages();
            updateImagePreviewUI();

            // === 图片查看浮层的关闭逻辑补充 ===
            // 点击浮层背景关闭
            imageViewerOverlay.addEventListener('click', function(e) {
                if (e.target === imageViewerOverlay) {
                    closeImageViewer();
                }
            });
            // ESC键关闭
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && imageViewerOverlay.classList.contains('active')) {
                    closeImageViewer();
                }
            });
        })();
    </script>
</body>
</html>
